# Sonarr quality profiles
# See: https://recyclarr.dev/wiki/yaml/config-reference/quality-profiles/

quality_profiles:
  # ============================================================
  # EXACT resolution profiles (no cross-resolution upgrades)
  # ============================================================

  - name: SD - 480p
    reset_unmatched_scores:
      enabled: true
    upgrade:
      allowed: true
      until_quality: 480p
      until_score: 10000
    min_format_score: 0
    quality_sort: top
    qualities:
      - name: 480p
        qualities:
          - WEBRip-480p
          - WEBDL-480p
          - Bluray-480p

  - name: SD - 480p Anime
