version: 2
updates:
  # Python requirements in the custom MCP server images
  # (docker/dockerfiles/mcp-*/requirements.txt)
  - package-ecosystem: "pip"
    directories:
      - "/docker/dockerfiles/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      mcp-python:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Base images in our custom Dockerfiles
  - package-ecosystem: "docker"
    directories:
      - "/docker/dockerfiles"
      - "/docker/dockerfiles/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dockerfile-bases:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Image tags in the compose files
  - package-ecosystem: "docker-compose"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      compose-images:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Postgres major bumps require pg_upgrade on on-disk data — handle manually.
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
      # Immich's postgres image is version-coupled to Immich itself (vector
      # extension compatibility window). Bump only alongside Immich upgrades.
      # Same applies to pgvecto.rs — a past auto-bump to 0.4 took Immich down.
      - dependency-name: "ghcr.io/immich-app/postgres"
      - dependency-name: "tensorchord/pgvecto-rs"

  # GitHub Actions workflow pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
