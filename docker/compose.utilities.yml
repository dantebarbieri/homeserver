# Utility services
# vaultwarden, syncthing, couchdb, ntfy, adguardhome, wg-easy, it-tools,
# code-server, convertx, snapotter, stirling-pdf, changedetection-io,
# sockpuppetbrowser, grocy, grocy-ntfy, grocy-autoconsume

services:
  vaultwarden:
    extends:
      file: compose.common.yml
      service: common-service
    image: vaultwarden/server:latest
    container_name: vaultwarden
    networks:
      - proxy
    volumes:
      - vw-data:/data

  syncthing:
    extends:
      file: compose.common.yml
      service: common-service
    image: syncthing/syncthing
    container_name: syncthing
    hostname: syncthing
    environment:
      - PUID=${UID}
      - PGID=${GID}
    volumes:
      - ${DATA}/syncthing:/var/syncthing
    ports:
      - "22000:22000/tcp"   # sync protocol
      - "22000:22000/udp"   # QUIC sync protocol
      - "21027:21027/udp"   # discovery broadcast
    networks:
      - proxy
    healthcheck:
      test: curl -fkLsS -m 2 127.0.0.1:8384/rest/noauth/health | grep -o --color=never OK || exit 1
      interval: 1m
      timeout: 10s
      retries: 3

  # CouchDB backend for the Obsidian "Self-hosted LiveSync" community plugin —
  # real-time, end-to-end-encrypted vault sync between desktop and iPhone (the
  # vault is the docs/ folder of the external WorldForge repo). Settings in
  # couchdb/local.ini follow the official obsidian-livesync setup; single_node =
  # true auto-creates the _users / _replicator / _global_changes system DBs on
  # first start. Admin credentials come from COUCHDB_USER / COUCHDB_PASSWORD.
  # Exposed via NPM at https://couchdb.danteb.com (mobile Obsidian requires a
  # valid TLS endpoint). See docs/OBSIDIAN-LIVESYNC.md.
  couchdb:
    extends:
      file: compose.common.yml
      service: common-service
    image: couchdb:3
    container_name: couchdb
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - couchdb-data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini:ro
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5984/_up || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  ntfy:
    extends:
      file: compose.common.yml
      service: common-service
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command:
      - serve
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 https://ntfy.danteb.com/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      TZ: ${TZ}
      NTFY_UPSTREAM_BASE_URL: "https://ntfy.sh"
    volumes:
      - ${DATA}/ntfy/config:/etc/ntfy
      - ${DATA}/ntfy/cache:/var/cache/ntfy
    networks:
      - proxy

  adguardhome:
    extends:
      file: compose.common.yml
      service: common-service
    image: adguard/adguardhome
    container_name: adguardhome
    volumes:
      - ${DATA}/adguardhome/workdir:/opt/adguardhome/work
      - ${DATA}/adguardhome/confdir:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks:
      - proxy

  wg-easy:
    extends:
      file: compose.common.yml
      service: common-service
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      WG_HOST: ${WGEASY_HOST}
      PASSWORD_HASH: ${WGEASY_PASSWORD_HASH}
      WG_DEFAULT_DNS: 192.168.50.100
      WG_POST_UP: "iptables-nft -t nat -A POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE; iptables-nft -A INPUT -p udp -m udp --dport 51820 -j ACCEPT; iptables-nft -A FORWARD -i wg0 -j ACCEPT; iptables-nft -A FORWARD -o wg0 -j ACCEPT;"
      WG_POST_DOWN: "iptables-nft -t nat -D POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE; iptables-nft -D INPUT -p udp -m udp --dport 51820 -j ACCEPT; iptables-nft -D FORWARD -i wg0 -j ACCEPT; iptables-nft -D FORWARD -o wg0 -j ACCEPT;"
    volumes:
      - ${DATA}/wg-easy:/etc/wireguard
    ports:
      - "51820:51820/udp"
    networks:
      - proxy

  it-tools:
    extends:
      file: compose.common.yml
      service: common-service
    image: corentinth/it-tools:latest
    container_name: it-tools
    networks:
      - proxy

  code-server:
    extends:
      file: compose.common.yml
      service: linuxserver-service
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    volumes:
      - ${DATA}/code-server/config:/config
      - /srv/homeserver:/srv/homeserver
      - /srv/docker/data:/srv/docker/data
    networks:
      - proxy

  convertx:
    extends:
      file: compose.common.yml
      service: common-service
    image: ghcr.io/c4illin/convertx:latest
    container_name: convertx
    environment:
      JWT_SECRET: ${CONVERTX_JWT_SECRET}
      HTTP_ALLOWED: "true"
      ACCOUNT_REGISTRATION: "false"
    volumes:
      - ${DATA}/convertx/data:/app/data
    networks:
      - proxy

  snapotter:
    extends:
      file: compose.common.yml
      service: gpu-service
    # Upstream renamed Stirling Image → ashim → SnapOtter. The new
    # ghcr.io/snapotter-hq/snapotter registry isn't published yet, so we
    # pull from the still-active ashim-hq namespace. Switch once it exists.
    image: ghcr.io/ashim-hq/ashim:latest
    container_name: snapotter
    restart: unless-stopped
    volumes:
      - ${DATA}/snapotter/data:/data
    networks:
      - proxy

  stirling-pdf:
    extends:
      file: compose.common.yml
      service: common-service
    image: stirlingtools/stirling-pdf:latest-fat
    container_name: stirling-pdf
    environment:
      LANGS: "en_US"
    volumes:
      - ${DATA}/stirling-pdf/tessdata:/usr/share/tessdata
      - ${DATA}/stirling-pdf/configs:/configs
      - ${DATA}/stirling-pdf/logs:/logs
      - ${DATA}/stirling-pdf/pipeline:/pipeline
    networks:
      - proxy

  changedetection-io:
    extends:
      file: compose.common.yml
      service: common-service
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: changedetection-io
    hostname: changedetection-io
    environment:
      BASE_URL: "https://${CHANGEDETECTION_HOSTNAME:-cd.danteb.com}"
      PLAYWRIGHT_DRIVER_URL: "ws://sockpuppetbrowser:3000/?stealth=1&--disable-web-security=true"
      USE_X_SETTINGS: "1"
    volumes:
      - ${DATA}/changedetection/datastore:/datastore
    networks:
      - proxy
      - changedetection
    depends_on:
      - sockpuppetbrowser

  sockpuppetbrowser:
    extends:
      file: compose.common.yml
      service: common-service
    image: dgtlmoon/sockpuppetbrowser:latest
    container_name: sockpuppetbrowser
    shm_size: 2gb
    cap_add: [SYS_ADMIN]
    networks:
      - changedetection

  # Grocy — household stock / medicine / pantry inventory with consumption
  # tracking, barcode scanning (Open Food Facts), expiry tracking, recipes,
  # and per-product min-stock thresholds. Built-in multi-user (so no Authelia).
  # Internal port 80 (linuxserver image; 9283 is the suggested host port).
  grocy:
    extends:
      file: compose.common.yml
      service: linuxserver-service
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    volumes:
      - ${DATA}/grocy/config:/config
    networks:
      - proxy
      - grocy

  # Grocy doesn't have native low-stock push notifications. This sidecar polls
  # GET /api/stock/volatile and forwards the `missing_products` list to ntfy
  # whenever the set changes. State persists across restarts in ${DATA}.
  grocy-ntfy:
    extends:
      file: compose.common.yml
      service: common-service
    image: grocy-ntfy
    build:
      context: dockerfiles/grocy-ntfy
    container_name: grocy-ntfy
    depends_on:
      grocy:
        condition: service_started
    environment:
      GROCY_URL: "http://grocy"
      GROCY_API_KEY: ${GROCY_API_KEY:-}
      GROCY_NTFY_URL: ${GROCY_NTFY_URL:-https://ntfy.danteb.com}
      GROCY_NTFY_TOPIC: ${GROCY_NTFY_TOPIC:-grocy-alerts}
      GROCY_POLL_INTERVAL: ${GROCY_POLL_INTERVAL:-3600}
    volumes:
      - ${DATA}/grocy-ntfy:/state
    networks:
      - grocy

  # Grocy has no scheduled-consume feature, but daily medication should
  # decrement automatically. This sidecar wakes once a day at
  # GROCY_AUTOCONSUME_TIME (local TZ), finds every product in the
  # 'Auto-consume daily' product group, and POSTs a consume action for the
  # product's `quick_consume_amount`. Dedupes on date so restarts don't
  # double-consume.
  grocy-autoconsume:
    extends:
      file: compose.common.yml
      service: common-service
    image: grocy-autoconsume
    build:
      context: dockerfiles/grocy-autoconsume
    container_name: grocy-autoconsume
    depends_on:
      grocy:
        condition: service_started
    environment:
      TZ: ${TZ}
      GROCY_URL: "http://grocy"
      GROCY_API_KEY: ${GROCY_API_KEY:-}
      GROCY_AUTOCONSUME_GROUP: ${GROCY_AUTOCONSUME_GROUP:-Auto-consume daily}
      GROCY_AUTOCONSUME_TIME: ${GROCY_AUTOCONSUME_TIME:-08:00}
      GROCY_AUTOCONSUME_DIGEST: ${GROCY_AUTOCONSUME_DIGEST:-0}
      GROCY_NTFY_URL: ${GROCY_NTFY_URL:-https://ntfy.danteb.com}
      GROCY_NTFY_TOPIC: ${GROCY_NTFY_TOPIC:-grocy-alerts}
    volumes:
      - ${DATA}/grocy-autoconsume:/state
    networks:
      - grocy

volumes:
  vw-data:
  couchdb-data:

networks:
  proxy:
  changedetection:
  grocy:
