# Web hosting services
# Uncomment services as needed

services:
  travel-planner:
    build:
      context: ${TRAVEL_PLANNER_PATH:?Set TRAVEL_PLANNER_PATH in .env}
      dockerfile: Dockerfile
    container_name: travel-planner
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: ${TRAVEL_PLANNER_PATH:?Set TRAVEL_PLANNER_PATH in .env}/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: https://travel.danteb.com
      DATABASE_PATH: /app/data/cache.db
      TRUST_PROXY: "true"
    volumes:
      - ${DATA}/travel-planner:/app/data
    networks:
      proxy:
        aliases:
          - travel-planner

  skyjo:
    extends:
      file: compose.common.yml
      service: common-service
    build:
      context: ${SKYJO_PATH:?Set SKYJO_PATH in .env}
      dockerfile: docker/frontend.Dockerfile
    container_name: skyjo
    networks:
      proxy:
        aliases:
          - skyjo
      skyjo:

  skyjo_server:
    extends:
      file: compose.common.yml
      service: common-service
    build:
      context: ${SKYJO_PATH:?Set SKYJO_PATH in .env}
      dockerfile: docker/backend.Dockerfile
    container_name: skyjo_server
    networks:
      skyjo:
        aliases:
          - backend
    environment:
      DATABASE_URL: postgres://skyjo:${SKYJO_DB_PASSWORD}@skyjo_postgres:5432/skyjo
      SKYJO_JWT_SECRET: ${SKYJO_JWT_SECRET}
      SKYJO_DATA_DIR: /var/lib/skyjo
    volumes:
      - skyjo-data:/var/lib/skyjo
    depends_on:
      skyjo_postgres:
        condition: service_healthy

  skyjo_postgres:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: skyjo_postgres
    image: postgres:17-alpine
    networks:
      - skyjo
    volumes:
      - skyjo-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: skyjo
      POSTGRES_PASSWORD: ${SKYJO_DB_PASSWORD}
      POSTGRES_DB: skyjo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyjo -d skyjo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

