# Web hosting services
# Uncomment services as needed

services:
  travel-planner:
    build:
      context: ${TRAVEL_PLANNER_PATH:?Set TRAVEL_PLANNER_PATH in .env}
      dockerfile: Dockerfile
    container_name: travel-planner
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: ${TRAVEL_PLANNER_PATH:?Set TRAVEL_PLANNER_PATH in .env}/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: https://travel.danteb.com
      DATABASE_PATH: /app/data/cache.db
      TRUST_PROXY: "true"
    volumes:
      - ${DATA}/travel-planner:/app/data
    networks:
      proxy:
        aliases:
          - travel-planner

  skyjo:
    extends:
      file: compose.common.yml
      service: common-service
    image: skyjo-frontend
    build:
      context: ${SKYJO_PATH:?Set SKYJO_PATH in .env}
      dockerfile: docker/frontend.Dockerfile
    container_name: skyjo
    networks:
      proxy:
        aliases:
          - skyjo
      skyjo:
    # The image's baked HEALTHCHECK hits http://localhost/, which busybox wget
    # resolves to ::1 first — but nginx inside the container only binds IPv4,
    # so the check fails with "Connection refused". Force IPv4.
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  skyjo_server:
    extends:
      file: compose.common.yml
      service: common-service
    image: skyjo-server
    build:
      context: ${SKYJO_PATH:?Set SKYJO_PATH in .env}
      dockerfile: docker/backend.Dockerfile
    container_name: skyjo_server
    networks:
      skyjo:
        aliases:
          - backend
    environment:
      DATABASE_URL: postgres://skyjo:${SKYJO_DB_PASSWORD:-skyjo}@db:5432/skyjo
      SKYJO_JWT_SECRET: ${SKYJO_JWT_SECRET}
      SKYJO_DATA_DIR: /var/lib/skyjo
    volumes:
      - skyjo-data:/var/lib/skyjo
    depends_on:
      skyjo_postgres:
        condition: service_healthy

  skyjo_postgres:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: skyjo_postgres
    image: postgres:17-alpine
    networks:
      skyjo:
        aliases:
          - db
    volumes:
      - skyjo-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: skyjo
      POSTGRES_PASSWORD: ${SKYJO_DB_PASSWORD:-skyjo}
      POSTGRES_DB: skyjo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyjo -d skyjo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # sorry.danteb.com — online Sorry! game + simulator
  # Two containers sharing an internal `sorry` network:
  #   sorry (nginx) serves the SvelteKit static build and proxies /api/* +
  #   /api/rooms/<code>/ws → sorry_server:8080. Only `sorry` joins `proxy`.
  sorry:
    extends:
      file: compose.common.yml
      service: common-service
    image: sorry-frontend
    build:
      context: ${SORRY_PATH:?Set SORRY_PATH in .env}
      dockerfile: docker/frontend.Dockerfile
    container_name: sorry
    networks:
      proxy:
        aliases:
          - sorry
          # NPM proxy host for sorry.danteb.com targets the `sorry-game`
          # upstream, matching the repo name. Keep the alias so the
          # reverse proxy config doesn't need to change.
          - sorry-game
      sorry:
    # Baked HEALTHCHECK in frontend.Dockerfile hits 127.0.0.1/ — explicit
    # here as well so an image rebuild without the HEALTHCHECK line still
    # gets a working check.
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      sorry_server:
        condition: service_started

  sorry_server:
    extends:
      file: compose.common.yml
      service: common-service
    image: sorry-server
    build:
      context: ${SORRY_PATH:?Set SORRY_PATH in .env}
      dockerfile: docker/backend.Dockerfile
    container_name: sorry_server
    networks:
      sorry:
        aliases:
          - backend
    environment:
      SORRY_PORT: 8080
      # Same-origin deploy — nginx in `sorry` proxies /api/* under the same
      # hostname, so the server never needs to emit CORS headers.
      SORRY_CORS_ORIGIN: ""
      RUST_LOG: sorry_server=info,tower_http=info

