# Core infrastructure services
# nginxproxymanager, ddclient, endlessh, bmc-ip-monitor

services:
  nginxproxymanager:
    extends:
      file: compose.common.yml
      service: common-service
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginxproxymanager
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    networks:
      - proxy
      - npm-internal
    volumes:
      - ${DATA}/nginxproxymanager/data:/data
      - ${DATA}/nginxproxymanager/letsencrypt:/etc/letsencrypt
      - ${DATA}/nginxproxymanager/snippets:/snippets

  ddclient:
    extends:
      file: compose.common.yml
      service: linuxserver-service
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    networks:
      - ddns
    volumes:
      - ${DATA}/ddclient/config:/config

  endlessh:
    extends:
      file: compose.common.yml
      service: common-service
    image: shizunge/endlessh-go
    container_name: endlessh
    ports:
      - "22:2222"
    command: ["-logtostderr", "-v=1"]

  bmc-ip-monitor:
    extends:
      file: compose.common.yml
      service: common-service
    image: bmc-ip-monitor
    build:
      context: dockerfiles/bmc-monitor
    container_name: bmc-ip-monitor
    devices:
      - /dev/ipmi0:/dev/ipmi0
    networks:
      - npm-internal
    environment:
      NPM_EMAIL: ${NPM_EMAIL}
      NPM_PASSWORD: ${NPM_PASSWORD}
      NPM_HOST: nginxproxymanager
      NPM_PORT: 81
      PROXY_DOMAIN: ipmi.danteb.com
      CHECK_INTERVAL: 900
      NTFY_URL: https://ntfy.danteb.com
      NTFY_TOPIC: homeserver-alerts

networks:
  ddns:
    enable_ipv6: true
  npm-internal:
  proxy:
