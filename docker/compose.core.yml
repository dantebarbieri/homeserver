# Core infrastructure services
# nginxproxymanager, ddclient, endlessh, bmc-ip-monitor

services:
  nginxproxymanager:
    extends:
      file: compose.common.yml
      service: common-service
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginxproxymanager
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    networks:
      - proxy
      - npm-internal
    volumes:
      - ${DATA}/nginxproxymanager/data:/data
      - ${DATA}/nginxproxymanager/letsencrypt:/etc/letsencrypt
      - ${DATA}/nginxproxymanager/snippets:/snippets
      # Custom nginx config is kept in-repo (git source of truth) and mounted
      # read-only OUTSIDE /data/nginx. NPM's s6 prepare step (50-ipv6.sh) rewrites
      # every *.conf under /data/nginx via `sed > tmp && mv tmp file`; `mv` over an
      # individual bind-mounted file fails ("Device or resource busy") and, with
      # `set -e`, aborts startup so nginx never comes up. Thin include stubs seeded
      # into the data volume at /data/nginx/custom/{http.conf,server_proxy.conf}
      # `include` the real files from here instead.
      - ./nginx:/data/custom:ro
      - ./nginx/404.html:/data/nginx/default_www/404.html
      - ./nginx/502.html:/data/nginx/default_www/502.html

  ddclient:
    extends:
      file: compose.common.yml
      service: linuxserver-service
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    networks:
      - ddns
    volumes:
      - ${DATA}/ddclient/config:/config

  endlessh:
    extends:
      file: compose.common.yml
      service: common-service
    image: shizunge/endlessh-go
    container_name: endlessh
    ports:
      - "22:2222"
    command: ["-logtostderr", "-v=1"]

  bmc-ip-monitor:
    extends:
      file: compose.common.yml
      service: common-service
    image: bmc-ip-monitor
    build:
      context: dockerfiles/bmc-monitor
    container_name: bmc-ip-monitor
    depends_on:
      nginxproxymanager:
        condition: service_started
    devices:
      - /dev/ipmi0:/dev/ipmi0
    networks:
      - npm-internal
    environment:
      NPM_EMAIL: ${NPM_EMAIL}
      NPM_PASSWORD: ${NPM_PASSWORD}
      NPM_HOST: nginxproxymanager
      NPM_PORT: 81
      PROXY_DOMAIN: ipmi.danteb.com
      CHECK_INTERVAL: 900
      MAX_FAILURES: 3
      NTFY_URL: https://ntfy.danteb.com
      NTFY_TOPIC: homeserver-alerts

networks:
  ddns:
    enable_ipv6: true
  npm-internal:
  proxy:
