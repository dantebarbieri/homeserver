# AI services stack
# whisperasr (speech-to-text; used by Bazarr for subtitle generation)

services:
  whisperasr:
    extends:
      file: compose.common.yml
      service: gpu-service
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: whisperasr
    environment:
      ASR_ENGINE: faster_whisper
      ASR_MODEL: large-v3
      ASR_DEVICE: cuda
      ASR_QUANTIZATION: float16
    networks:
      - starr

networks:
  starr:
