# Docker Compose - Main Index File
# This file includes all service categories and defines shared resources
# Run: docker compose up -d

# Explicit project name — matches the original /srv/docker/compose directory name.
# Changing this would orphan 13 named Docker volumes (pgdata, vw-data, etc.)
# and require manual volume migration. Keep as "compose".
name: compose

include:
  # Note: compose.common.yml is NOT included here - it's only used via extends:
  - compose.ai.yml
  - compose.core.yml
  - compose.auth.yml
  - compose.dashboards.yml
  - compose.downloads.yml
  - compose.gaming.yml
  - compose.geo.yml
  - compose.git.yml
  - compose.immich.yml
  - compose.knowledge.yml
  - compose.matrix.yml
  - compose.mcp.yml
  - compose.media.yml
  - compose.nextcloud.yml
  - compose.searxng.yml
  - compose.starr.yml
  - compose.monitoring.yml
  - compose.utilities.yml
  - compose.websites.yml

# Network for services behind the reverse proxy (Nginx Proxy Manager)
networks:
  proxy:
    enable_ipv6: true

# Centralized secrets for security visibility
secrets:
  EMAIL_PASSWORD:
    file: '${DATA}/authelia/secrets/EMAIL_PASSWORD'
  JWT_SECRET:
    file: '${DATA}/authelia/secrets/JWT_SECRET'
  SESSION_SECRET:
    file: '${DATA}/authelia/secrets/SESSION_SECRET'
  AUTHELIA_STORAGE_PASSWORD:
    file: '${DATA}/authelia/secrets/STORAGE_PASSWORD'
  STORAGE_ENCRYPTION_KEY:
    file: '${DATA}/authelia/secrets/STORAGE_ENCRYPTION_KEY'
  MCP_TOKEN_OPENZIM:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_OPENZIM'
  MCP_TOKEN_WIKIPEDIA:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_WIKIPEDIA'
  MCP_TOKEN_WIKIDATA:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_WIKIDATA'
  MCP_TOKEN_SEARXNG:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_SEARXNG'
  MCP_TOKEN_NOMINATIM:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_NOMINATIM'
  MCP_TOKEN_PHOTON:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_PHOTON'
  MCP_TOKEN_VALHALLA:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_VALHALLA'
  MCP_TOKEN_ELEV:
    file: '${DATA}/mcp/secrets/MCP_TOKEN_ELEV'
