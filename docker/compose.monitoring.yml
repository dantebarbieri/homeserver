# Monitoring stack: Prometheus, Grafana, Loki, Alloy, node-exporter, cAdvisor
#
# Only Grafana is publicly exposed (via proxy network).
# All other services stay on the internal monitoring network — they have
# no authentication and must never be exposed publicly.

services:
  prometheus:
    extends:
      file: compose.common.yml
      service: common-service
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
    volumes:
      - ${DATA}/prometheus:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring

  grafana:
    extends:
      file: compose.common.yml
      service: common-service
    image: grafana/grafana:latest
    container_name: grafana
    user: "472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.danteb.com
    volumes:
      - ${DATA}/grafana:/var/lib/grafana
    networks:
      - proxy
      - monitoring
    depends_on:
      - prometheus
      - loki

  loki:
    extends:
      file: compose.common.yml
      service: common-service
    image: grafana/loki:latest
    container_name: loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - ${DATA}/loki:/loki
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - monitoring

  alloy:
    extends:
      file: compose.common.yml
      service: common-service
    image: grafana/alloy:latest
    container_name: alloy
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--storage.path=/var/lib/alloy/data"
    volumes:
      - ./monitoring/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA}/alloy:/var/lib/alloy
    networks:
      - monitoring
    depends_on:
      - loki

  node-exporter:
    extends:
      file: compose.common.yml
      service: common-service
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    extends:
      file: compose.common.yml
      service: common-service
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    command:
      - "--docker_only=true"
      - "--store_container_labels=true"
      - "--housekeeping_interval=10s"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /run/docker/containerd/containerd.sock:/run/containerd/containerd.sock:ro
    networks:
      - monitoring

networks:
  proxy:
  monitoring:
