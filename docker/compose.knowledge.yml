# ZIM knowledge library for the OpenClaw v3 travel agent
# kiwix-serve
#
# Serves all *.zim files placed in ${OPENCLAW_V3_BASE}/zim/. The container
# exposes both a browser UI (at https://kiwix.danteb.com) and the underlying
# HTTP endpoints that openzim-mcp queries via libzim. ZIM downloads are a
# manual step (see scripts/zim-refresh.sh) — this compose file just serves
# whatever is on disk.

services:
  kiwix-serve:
    extends:
      file: compose.common.yml
      service: common-service
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix-serve
    # Wrap in sh -c so the *.zim glob is expanded by the shell. Without
    # this, Docker passes the literal string "*.zim" to kiwix-serve,
    # which prints usage and exits.
    entrypoint: ["sh", "-c"]
    command: ["exec kiwix-serve --port=8080 --blockexternal /data/*.zim"]
    working_dir: /data
    networks:
      - proxy
      - knowledge
    volumes:
      - ${OPENCLAW_V3_BASE:?set OPENCLAW_V3_BASE in .env}/zim:/data:ro
    # /ROOT/ returns 404 — hit the library root instead.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
  knowledge:
