# Immich photo management stack
# immich-server, immich-machine-learning, immich-redis, immich-postgres

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    extends:
      file: hwaccel.transcoding.yml
      service: nvenc
    networks:
      - proxy
      - immich
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    depends_on:
      - immich-redis
      - immich-postgres
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-cuda
    extends:
      file: hwaccel.ml.yml
      service: cuda
    networks:
      - immich
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich_redis
    image: docker.io/redis:8.6-alpine@sha256:c5e375abb885e6b2021c0377879e4890bf76f9065b8922ffc113f2b226b9fc17
    networks:
      - immich
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1

  immich-postgres:
    container_name: immich_postgres
    # Official Immich-maintained postgres image: bundles pgvecto.rs 0.2.0 (for the
    # existing schema) and VectorChord 0.4.3 (migration target). Immich auto-migrates
    # from pgvecto.rs to VectorChord on startup. See:
    # https://docs.immich.app/install/upgrading#migrating-to-vectorchord
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    shm_size: 128mb
    networks:
      - immich
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      disable: false

networks:
  proxy:
  immich:

volumes:
  model-cache:
  pgdata:
