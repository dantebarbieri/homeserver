# Custom error pages for proxy hosts.
# Mounted read-only at /data/custom and pulled in by the stub
# /data/nginx/custom/server_proxy.conf, which NPM auto-includes in every
# proxy host server block. See compose.core.yml.

error_page 502 503 504 /502.html;

location = /502.html {
    root /data/nginx/default_www;
    internal;
}
