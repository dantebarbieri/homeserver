# HTTPS default server for unmatched *.danteb.com subdomains.
# Serves the custom 404 page with the wildcard SSL cert.
# Auto-included by NPM via /data/nginx/custom/http.conf.

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name _;

    # *.danteb.com wildcard cert (NPM cert ID: npm-2)
    ssl_certificate /etc/letsencrypt/live/npm-2/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npm-2/privkey.pem;
    include conf.d/include/ssl-ciphers.conf;

    access_log /data/logs/default-host_access.log combined;
    error_log /data/logs/default-host_error.log warn;

    location / {
        default_type text/html;
        return 404 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 480px; }
    .code {
      font-size: 8rem;
      font-weight: 700;
      color: #58a6ff;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    h1 { font-size: 1.5rem; font-weight: 600; color: #e6edf3; margin: 1rem 0 0.75rem; }
    p { font-size: 1.05rem; line-height: 1.6; margin-bottom: 2rem; color: #8b949e; }
    a {
      display: inline-block;
      padding: 0.6rem 1.6rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.95rem;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover { background: #161b22; border-color: #58a6ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you\\'re looking for doesn\\'t exist on this server.</p>
    <a href="https://danteb.com">Go to Homepage</a>
  </div>
</body>
</html>';
    }
}
