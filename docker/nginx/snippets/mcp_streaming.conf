# MCP Streamable HTTP transport tuning for mcp.danteb.com.
# Bind-mounted into NPM at /snippets/mcp_streaming.conf via the existing
# ${DATA}/nginxproxymanager/snippets:/snippets mount.
#
# Pull this into the proxy host's NPM Advanced tab with:
#     include /snippets/mcp_streaming.conf;
#
# Disable "Block Common Exploits" in the NPM UI for mcp.danteb.com — it
# false-positives on JSON-RPC payloads.

proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_buffering off;
proxy_cache off;
chunked_transfer_encoding off;
proxy_read_timeout 86400s;
proxy_send_timeout 86400s;

proxy_set_header MCP-Protocol-Version $http_mcp_protocol_version;
proxy_set_header MCP-Session-Id       $http_mcp_session_id;
proxy_set_header Last-Event-ID        $http_last_event_id;
proxy_pass_header MCP-Session-Id;
