# CouchDB configuration for Obsidian Self-hosted LiveSync.
#
# Mounted read-only at /opt/couchdb/etc/local.d/local.ini. CouchDB merges every
# *.ini in local.d/, so these settings sit alongside the docker.ini that the
# image's entrypoint generates from COUCHDB_USER / COUCHDB_PASSWORD.
#
# Values mirror the official obsidian-livesync setup
# (https://github.com/vrtmrz/obsidian-livesync, "Setup CouchDB" +
# utils/couchdb/couchdb-init.sh). With single_node = true CouchDB auto-creates
# the system databases (_users, _replicator, _global_changes) on first start,
# so no separate cluster-setup REST call is required.

[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
require_valid_user = true
# Exempt only the /_up liveness endpoint so Docker healthchecks and the
# Homepage siteMonitor can probe without credentials. Every other endpoint
# still requires a valid user.
require_valid_user_except_for_up = true
bind_address = 0.0.0.0
max_http_request_size = 4294967296
enable_cors = true

[chttpd_auth]
require_valid_user = true

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
