# Git hosting
# forgejo, forgejo_postgres, forgejo_runner, forgejo_runner_dind

services:
  forgejo:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: forgejo
    image: codeberg.org/forgejo/forgejo:15
    environment:
      USER_UID: ${UID}
      USER_GID: ${GID}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo_postgres:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD}
      FORGEJO__server__LFS_START_SERVER: "true"
      FORGEJO__server__LFS_JWT_SECRET: ${LFS_JWT_SECRET}
      FORGEJO__lfs__PATH: /data/git/lfs
    networks:
      - proxy
      - forgejo
    ports:
      - "2222:22"
    volumes:
      - ${DATA}/forgejo:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      forgejo_postgres:
        condition: service_healthy

  forgejo_postgres:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: forgejo_postgres
    image: postgres:16-alpine
    networks:
      - forgejo
    volumes:
      - forgejo-pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    environment:
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD}
      POSTGRES_DB: forgejo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgejo -d forgejo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Forgejo Actions runner — executes workflows from .forgejo/workflows/
  # and .github/workflows/ in repos hosted on the forgejo container.
  #
  # Registration is idempotent via the shared-secret flow:
  #   1. Generate a 40-hex secret:  openssl rand -hex 20
  #   2. Store it in .env as FORGEJO_RUNNER_SECRET (gitignored).
  #   3. Register once:
  #        docker exec forgejo forgejo forgejo-cli actions register \
  #            --name homeserver-runner --secret "$FORGEJO_RUNNER_SECRET"
  #      The command prints a UUID; copy it (along with the secret) into
  #      ${DATA}/forgejo_runner/runner-config.yml under server.connections.
  #   4. dcu — the runner picks up the config on start.
  #
  # Topology: jobs run as containers spawned by a sibling docker:dind
  # daemon (forgejo_runner_dind below) over TCP. This isolates the host
  # docker socket from the runner — recommended by Forgejo upstream.
  forgejo_runner:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: forgejo_runner
    image: data.forgejo.org/forgejo/runner:12
    # Run as the host owner of ${DATA} (uid:gid = ${UID}:${GID} = 1000:1000
    # on HomeServer) so the bind-mounted /data is writable without sudo on
    # the host. Upstream's example uses 1001:1001; we deviate to match the
    # HomeServer-wide convention used by every other service.
    user: "${UID}:${GID}"
    depends_on:
      forgejo_runner_dind:
        condition: service_started
      forgejo:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://forgejo_runner_dind:2375
    networks:
      - forgejo
      - forgejo_runner_internal
    volumes:
      - ${DATA}/forgejo_runner:/data
    command: forgejo-runner daemon --config /data/runner-config.yml

  # Sibling docker daemon used by forgejo_runner to spawn job containers.
  # Privileged is required for dockerd-in-dockerd; isolated to its own
  # network so only the runner can reach it (no TLS on the TCP socket).
  forgejo_runner_dind:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: forgejo_runner_dind
    image: docker:28-dind
    privileged: true
    command: ["dockerd", "-H", "tcp://0.0.0.0:2375", "--tls=false"]
    networks:
      - forgejo_runner_internal
    volumes:
      - forgejo-runner-dind-data:/var/lib/docker

networks:
  proxy:
  forgejo:
  forgejo_runner_internal:

volumes:
  forgejo-pgdata:
  forgejo-runner-dind-data:
