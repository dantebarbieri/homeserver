<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Authorize {{ client_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      max-width: 36em;
      margin: 4em auto;
      padding: 0 1em;
      color: #1c1c1c;
      background: #fafafa;
    }
    h1 { font-size: 1.5em; margin-bottom: 0.25em; }
    .sub { color: #666; margin-top: 0; }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5em;
      margin: 1.5em 0;
    }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.5em 1em; margin: 0; }
    dt { font-weight: 600; color: #555; }
    dd { margin: 0; word-break: break-all; }
    .scope-none { color: #888; font-style: italic; }
    .actions { display: flex; gap: 0.75em; margin-top: 1.5em; }
    button {
      flex: 1;
      padding: 0.75em 1em;
      font-size: 1em;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .approve { background: #2563eb; color: white; }
    .approve:hover { background: #1d4ed8; }
    .deny { background: #e5e7eb; color: #1c1c1c; }
    .deny:hover { background: #d1d5db; }
    .signed-in { color: #666; font-size: 0.9em; margin-top: 1em; }
  </style>
</head>
<body>
  <h1>Authorize this integration?</h1>
  <p class="sub"><strong>{{ client_name }}</strong> wants to access your homeserver.</p>

  <div class="card">
    <dl>
      <dt>Resource</dt>
      <dd>{{ resource }}</dd>
      <dt>Scope</dt>
      <dd>
        {% if scope == "(none)" %}
          <span class="scope-none">none requested</span>
        {% else %}
          {{ scope }}
        {% endif %}
      </dd>
      <dt>Client ID</dt>
      <dd><code>{{ client_id }}</code></dd>
    </dl>
  </div>

  <form method="POST" action="/authorize">
    <input type="hidden" name="auth_request_id" value="{{ auth_request_id }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="actions">
      <button class="approve" type="submit" name="decision" value="approve">Approve</button>
      <button class="deny" type="submit" name="decision" value="deny">Deny</button>
    </div>
  </form>

  <p class="signed-in">Signed in as <strong>{{ user_display }}</strong>.</p>
</body>
</html>
