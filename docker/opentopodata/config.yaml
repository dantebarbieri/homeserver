max_locations_per_request: 100

# Memcache is disabled via the DISABLE_MEMCACHE=1 env var in compose.geo.yml —
# api.py hardcodes a Unix-socket MemcachedCache that our slim image has no
# memcached process to back, so without that env var /health hangs. The
# in-process _SIMPLE_CACHE dict is fine for our single-user volume.

datasets:
  - name: cop30
    path: data/copernicus-glo30/
    filename_epsg: 4326
    filename_tile_size: 1
  - name: srtm30m
    path: data/srtm30m/
    filename_epsg: 4326
    filename_tile_size: 1
