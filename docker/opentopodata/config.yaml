max_locations_per_request: 100

# Disable memcached — upstream's own Dockerfile bundles memcached + supervisord,
# but our slim image doesn't. For our single-user low-volume usage, in-process
# cache is fine. Setting host to null makes Flask-Caching fall back to simple.
memcached_host: null

datasets:
  - name: cop30
    path: data/copernicus-glo30/
    filename_epsg: 4326
    filename_tile_size: 1
  - name: srtm30m
    path: data/srtm30m/
    filename_epsg: 4326
    filename_tile_size: 1
