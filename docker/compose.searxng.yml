# SearXNG search engine stack
# Public instance: searxng + searxng_redis (HTML-only, public, hardened)
# AI-private instance: searxng-ai + searxng-ai-valkey (HTML+JSON, internal,
#   curated engines, hostnames-plugin tuned for travel research)
#
# The two instances share NOTHING at the cache layer (separate Valkey
# containers, separate volumes) so a poisoned AI cache cannot affect the
# public instance and vice versa.

services:
  searxng_redis:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: searxng_redis
    image: cgr.dev/chainguard/valkey:latest
    command: --save 30 1 --loglevel warning
    networks: [searxng]
    volumes: [valkey-data:/data]
    cap_drop: [ALL]
    cap_add: [SETGID, SETUID, DAC_OVERRIDE]

  searxng:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: searxng
    image: searxng-carta
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.searxng
    networks:
      - proxy
      - searxng
    volumes:
      - ${DATA}/searxng/config:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "https://${SEARXNG_HOSTNAME:-localhost}/"
      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY:?set SEARXNG_SECRET_KEY in .env (openssl rand -hex 32)}
      SEARXNG_VALKEY_URL: valkey://searxng_redis:6379/0
    cap_drop: [ALL]
    # DAC_OVERRIDE: the searxng image runs its granian worker as root but must
    # write to paths owned by the searxng user (uid 977) — the bind-mounted
    # /etc/searxng config and the internal /var/cache/searxng sqlite engine
    # cache. Default Docker root relies on DAC_OVERRIDE for this; dropping it
    # caused "settings.yml.new: Permission denied" and the engine-cache
    # "no such table: properties" failures.
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]
    depends_on:
      - searxng_redis

  searxng-ai-valkey:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: searxng-ai-valkey
    image: valkey/valkey:9.0.3-alpine
    command: --save 30 1 --loglevel warning
    networks: [searxng-ai]
    volumes: [valkey-data-ai:/data]

  searxng-ai:
    extends:
      file: compose.common.yml
      service: common-service
    container_name: searxng-ai
    image: docker.io/searxng/searxng:latest
    networks:
      - proxy
      - searxng-ai
    volumes:
      - ./searxng-ai:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: "https://${SEARXNG_AI_HOSTNAME:-ai-search.danteb.com}/"
      SEARXNG_SECRET: ${SEARXNG_AI_SECRET_KEY:?set SEARXNG_AI_SECRET_KEY in .env (openssl rand -hex 32)}
      SEARXNG_REDIS_URL: redis://searxng-ai-valkey:6379/0
    cap_drop: [ALL]
    # DAC_OVERRIDE: needed so the root worker can write the internal
    # /var/cache/searxng sqlite engine cache (uid 977). The /etc/searxng config
    # mount is read-only by design, so this does not grant config writes.
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]
    depends_on:
      - searxng-ai-valkey

networks:
  proxy:
  searxng:
  searxng-ai:

volumes:
  valkey-data:
  valkey-data-ai:
