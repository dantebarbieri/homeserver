# Services dashboard with Docker status monitoring
# https://gethomepage.dev/configs/services/
#
# Each service has:
#   - siteMonitor: checks if the web UI is reachable (green/red dot)
#   - server/container: shows Docker container running status + stats
#   - widget (where supported): shows live service-specific data
#
# Widget API keys are placeholders — replace {{HOMEPAGE_VAR_*}} values
# by setting environment variables on the homepage container, or edit
# the keys inline after obtaining them from each service's settings.

- Media:
    - Plex:
        icon: plex.svg
        href: https://plex.danteb.com
        description: Movies & TV
        siteMonitor: https://plex.danteb.com
        server: my-docker
        container: plex
        widget:
          type: plex
          url: http://plex:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
    - Jellyfin:
        icon: jellyfin.svg
        href: https://jellyfin.danteb.com
        description: Movies & TV
        siteMonitor: https://jellyfin.danteb.com
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableNowPlaying: true
    - Seerr:
        icon: seerr.svg
        href: https://seerr.danteb.com
        description: Request Content
        siteMonitor: https://seerr.danteb.com
        server: my-docker
        container: seerr
        widget:
          type: seerr
          url: http://seerr:5055
          key: "{{HOMEPAGE_VAR_SEERR_KEY}}"
    - Immich:
        icon: immich.svg
        href: https://immich.danteb.com
        description: Photos
        siteMonitor: https://immich.danteb.com
        server: my-docker
        container: immich_server
        widget:
          type: immich
          url: http://immich_server:2283
          key: "{{HOMEPAGE_VAR_IMMICH_KEY}}"
          version: 2
    - Komga:
        icon: komga.svg
        href: https://komga.danteb.com
        description: Comics & Manga Reader
        siteMonitor: https://komga.danteb.com
        server: my-docker
        container: komga
        widget:
          type: komga
          url: http://komga:25600
          username: "{{HOMEPAGE_VAR_KOMGA_USER}}"
          password: "{{HOMEPAGE_VAR_KOMGA_PASS}}"

